<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>解剖闪背</title>
    <meta name="theme-color" content="#1e6b9b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="解剖闪背" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <style>
      #af-debug {
        position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
        background: #1a1a2e; color: #eee; font: 12px monospace;
        padding: 8px 12px; max-height: 200px; overflow-y: auto;
        border-bottom: 2px solid #e74c3c;
      }
      #af-debug .ok { color: #2ecc71; }
      #af-debug .err { color: #e74c3c; }
      #af-debug .warn { color: #f39c12; }
    </style>
  </head>
  <body>
    <div id="af-debug"><div>Boot: waiting for JS...</div></div>
    <div id="root"></div>
    <script>
      window._afLog = function(msg, cls) { var d=document.getElementById('af-debug'); d.innerHTML+='<div class="'+cls+'">'+msg+'</div>'; };
      window._afLog('Boot: HTML loaded', 'ok');
      window.onerror = function(m,s,l,c,e) { window._afLog('JS ERROR: '+m+' at '+s+':'+l, 'err'); };
      window.addEventListener('unhandledrejection', function(e) { window._afLog('PROMISE ERROR: '+e.reason?.message||e.reason, 'err'); });
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
  </body>
</html>
