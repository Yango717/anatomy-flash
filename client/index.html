<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>解剖闪背</title>
    <meta name="theme-color" content="#1e6b9b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="解剖闪背" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <style>
      #dbg{position:fixed;top:0;left:0;right:0;z-index:99999;background:#111;color:#eee;font:10px/1.3 monospace;padding:4px 8px;max-height:120px;overflow-y:auto;border-bottom:1px solid #e74c3c;}
    </style>
  </head>
  <body>
    <div id="dbg"></div>
    <div id="root" style="margin-top:30px;"></div>
    <script>
      var d=document.getElementById('dbg');
      window._L=function(m,c){d.innerHTML+='<span style="color:'+(c||'#eee')+'">'+m+'</span><br>';d.scrollTop=d.scrollHeight;};
      window._L('ok','#2ecc71');
      window.addEventListener('error',function(e){window._L('ERR:'+e.message,'red');});
      window.addEventListener('unhandledrejection',function(e){window._L('PERR:'+e.reason?.message,'red');});
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }
    </script>
  </body>
</html>
